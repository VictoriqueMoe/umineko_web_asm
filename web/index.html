    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #canvas {
            display: block;

        }

        #loading {
            position: absolute;
            color: #ccc;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }

        #loading.hidden {
            display: none;
        }

        #touch-controls {
            display: none;
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 999;
            gap: 12px;
        }

        #touch-controls button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 22px;
            line-height: 48px;
            text-align: center;
            pointer-events: auto;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        #touch-controls button:active {
            background: rgba(255, 255, 255, 0.35);
        }

        #mobile-notice {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            color: #eee;
            font-family: sans-serif;
            font-size: 13px;
            text-align: center;
            padding: 8px 36px 8px 12px;
            z-index: 998;
        }

        #mobile-notice button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        #fetch-indicator {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            color: #ccc;
            font-family: monospace;
            font-size: 13px;
            text-align: center;
            padding: 8px 12px 6px;
            z-index: 997;

        #fetch-bar-bg {
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            margin-top: 6px;
            border-radius: 2px;
        }

        #fetch-bar {
            height: 100%;
            background: #ccc;
            border-radius: 2px;

        #file-picker-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: sans-serif;

            text-align: center;

            padding: 24px;

        .picker-container h1 {
            font-size: 24px;
            color: #e0d6c8;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .picker-container p {

            color: #e0d6c8;
            border: 1px solid #4a3f35;
            border-radius: 6px;
            cursor: pointer;

        #btn-pick-folder:hover {

        #scan-status {
            margin-top: 16px;
            font-family: monospace;
            font-size: 13px;
            color: #888;

        #picker-error {
            margin-top: 12px;
            color: #c44;
            font-size: 13px;
        }

        #picker-error.hidden {
            display: none;
        }

        @media (pointer: coarse) {
            #touch-controls {
                display: flex;
            }

            #mobile-notice {

<body>
<div id="file-picker-screen">
    <div class="picker-container">
        <h1>Umineko no Naku Koro ni</h1>
        <p>Select your Umineko game folder to begin playing.</p>
        <p>The folder should contain default.cfg and the game data files.</p>
        <button id="btn-pick-folder">Select Game Folder</button>
        <input type="file" id="folder-input" webkitdirectory style="display:none">
        <div id="scan-status" class="hidden"></div>
        <div id="picker-error" class="hidden"></div>
    </div>
</div>
<div id="mobile-notice">
    Do not change the resolution in Config — it will break the display on mobile.
    <button onclick="this.parentElement.style.display='none'" aria-label="Dismiss">&times;</button>
</div>
<div id="fetch-indicator">
    <span id="fetch-text">Loading asset...</span>
    <div id="fetch-bar-bg">
        <div id="fetch-bar"></div>
    </div>
</div>
<div id="loading">Loading...</div>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<div id="touch-controls">
    <button id="btn-menu" aria-label="Menu">&#9776;</button>
    <button id="btn-fullscreen" aria-label="Fullscreen">&#x26F6;</button>
</div>

<script>const Game = {};</script>
<script src="js/fetch-indicator.js"></script>
<script src="js/idbfs-sync.js"></script>
<script src="js/vfs.js"></script>
<script src="js/remote-files.js"></script>
<script src="js/game-files.js"></script>
<script src="js/canvas.js"></script>
<script>
    var Module = {
        canvas: document.getElementById('canvas'),
        print: (text) => console.log(text),
        printErr: (text) => console.error(text),
        setStatus: (text) => {
            if (text) {
                document.getElementById('loading').textContent = text;
            }
        },
        preRun: [() => {
            FS.mkdir('/game');
            FS.mkdir('/home/web_user/.onscripter');
            FS.mount(IDBFS, {}, '/home/web_user/.onscripter');

            let savedCfgData = null;
            let manifestDone = false;
            let idbfsDone = false;

            const applySavedConfig = () => {
                if (idbfsDone && manifestDone && savedCfgData) {
                    FS.writeFile('/game/ons.cfg', savedCfgData);
                }
            };

            Module.addRunDependency('idbfs-sync');
            FS.syncfs(true, (err) => {
                if (err) {
                    console.warn('IDBFS initial sync error:', err);
                }
                try {
                    const entries = FS.readdir('/home/web_user/.onscripter');
                    for (let i = 0; i < entries.length; i++) {
                        if (entries[i] === '.' || entries[i] === '..') {
                            continue;
                        }
                        const subdir = '/home/web_user/.onscripter/' + entries[i];
                        try {
                            savedCfgData = FS.readFile(subdir + '/ons.cfg');
                        } catch (e) {
                        }
                    }
                } catch (e) {
                }
                idbfsDone = true;
                applySavedConfig();
                Module.removeRunDependency('idbfs-sync');
            });
            Game.setupGameFiles(() => {
                manifestDone = true;
                applySavedConfig();
            });
        }],
        onRuntimeInitialized: Game.initCanvas
    };
</script>
