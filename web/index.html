<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umineko</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #canvas {
            display: block;
            touch-action: none;
        }
        #loading {
            position: absolute;
            color: #ccc;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        #loading.hidden { display: none; }
        #touch-controls {
            display: none;
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 999;
            gap: 12px;
        }
        #touch-controls button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 22px;
            line-height: 48px;
            text-align: center;
            pointer-events: auto;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        #touch-controls button:active {
            background: rgba(255, 255, 255, 0.35);
        }
        #mobile-notice {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            color: #eee;
            font-family: sans-serif;
            font-size: 13px;
            text-align: center;
            padding: 8px 36px 8px 12px;
            z-index: 998;
        }
        #mobile-notice button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }
        #fetch-indicator {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            color: #ccc;
            font-family: monospace;
            font-size: 13px;
            text-align: center;
            padding: 8px 12px 6px;
            z-index: 997;
        }
        #fetch-bar-bg {
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            margin-top: 6px;
            border-radius: 2px;
        }
        #fetch-bar {
            height: 100%;
            background: #ccc;
            border-radius: 2px;
            width: 0%;
        }
        @media (pointer: coarse) {
            #touch-controls { display: flex; }
            #mobile-notice { display: block; }
        }
    </style>
</head>
<body>
    <div id="mobile-notice">
        Do not change the resolution in Config — it will break the display on mobile.
        <button onclick="this.parentElement.style.display='none'" aria-label="Dismiss">&times;</button>
    </div>
    <div id="fetch-indicator">
        <span id="fetch-text">Loading asset...</span>
        <div id="fetch-bar-bg"><div id="fetch-bar"></div></div>
    </div>
    <div id="loading">Loading...</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="touch-controls">
        <button id="btn-menu" aria-label="Menu">&#9776;</button>
        <button id="btn-fullscreen" aria-label="Fullscreen">&#x26F6;</button>
    </div>

    <script>
        const EAGER_PATTERNS = [
            /^default\.cfg$/,
            /^en\.file$/,
            /^chiru\.file$/,
            /^ru\.file$/,
            /^game\.hash$/,
            /^fonts\//
        ];

        window.gameFileSet = new Set();

        window._fetchName = 'asset';

        window.showFetchIndicator = function(name) {
            window._fetchName = name || 'asset';
            document.getElementById('fetch-text').textContent = 'Loading ' + window._fetchName + '...';
            document.getElementById('fetch-bar').style.width = '0%';
            document.getElementById('fetch-indicator').style.display = 'block';
        };
        window.hideFetchIndicator = function() {
            document.getElementById('fetch-indicator').style.display = 'none';
        };
        window.updateFetchProgress = function(received, total) {
            var pct = Math.round((received / total) * 100);
            document.getElementById('fetch-text').textContent = 'Loading ' + window._fetchName + '... ' + pct + '%';
            document.getElementById('fetch-bar').style.width = pct + '%';
        };

        function shouldEagerLoad(path) {
            for (let i = 0; i < EAGER_PATTERNS.length; i++) {
                if (EAGER_PATTERNS[i].test(path)) {
                    return true;
                }
            }
            return false;
        }

        function eagerFetch(vfsPath, url) {
            Module.addRunDependency('file:' + vfsPath);
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'arraybuffer';
            xhr.onload = function() {
                if (xhr.status === 200) {
                    FS.writeFile(vfsPath, new Uint8Array(xhr.response));
                } else {
                    console.warn('Failed to fetch ' + url + ' (status ' + xhr.status + ')');
                }
                Module.removeRunDependency('file:' + vfsPath);
            };
            xhr.onerror = function() {
                console.warn('Failed to fetch ' + url);
                Module.removeRunDependency('file:' + vfsPath);
            };
            xhr.send();
        }

        function setupGameFiles() {
            Module.addRunDependency('manifest');
            const loadingEl = document.getElementById('loading');

            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/manifest.json', true);
            xhr.responseType = 'json';
            xhr.onload = function() {
                if (xhr.status !== 200 || !xhr.response) {
                    console.error('Failed to load manifest');
                    Module.removeRunDependency('manifest');
                    return;
                }

                const manifest = xhr.response;
                const dirs = manifest.dirs;
                const files = manifest.files;

                loadingEl.textContent = 'Setting up filesystem...';

                for (let i = 0; i < dirs.length; i++) {
                    try {
                        FS.mkdirTree('/game/' + dirs[i]);
                    } catch (e) {}
                }

                let eagerCount = 0;
                let lazyCount = 0;

                for (let i = 0; i < files.length; i++) {
                    const filePath = files[i];
                    const vfsPath = '/game/' + filePath;

                    if (shouldEagerLoad(filePath)) {
                        eagerFetch(vfsPath, '/game/' + filePath);
                        eagerCount++;
                    } else {
                        try {
                            FS.writeFile(vfsPath, new Uint8Array(0));
                            window.gameFileSet.add(vfsPath);
                            lazyCount++;
                        } catch (e) {
                            console.warn('Failed to create stub: ' + vfsPath, e);
                        }
                    }
                }

                console.log('Filesystem setup: ' + eagerCount + ' eager, ' + lazyCount + ' lazy stubs');
                loadingEl.textContent = 'Loading game data (' + eagerCount + ' files)...';
                Module.removeRunDependency('manifest');
            };
            xhr.onerror = function() {
                console.error('Failed to fetch manifest');
                Module.removeRunDependency('manifest');
            };
            xhr.send();
        }

        (function() {
            const origGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                if (type === 'webgl' || type === 'webgl2') {
                    attrs = attrs || {};
                    attrs.preserveDrawingBuffer = true;
                }
                return origGetContext.call(this, type, attrs);
            };
        })();

        let idbfsSyncing = false;
        function syncIDBFS() {
            if (idbfsSyncing) {
                return;
            }
            idbfsSyncing = true;
            try {
                FS.syncfs(false, function(err) {
                    idbfsSyncing = false;
                    if (err) {
                        console.warn('IDBFS sync error:', err);
                    }
                });
            } catch (e) {
                idbfsSyncing = false;
            }
        }

        setInterval(syncIDBFS, 5000);
        window.addEventListener('beforeunload', syncIDBFS);

        var Module = {
            canvas: document.getElementById('canvas'),
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); },
            setStatus: function(text) {
                if (text) {
                    document.getElementById('loading').textContent = text;
                }
            },
            preRun: [function() {
                FS.mkdir('/game');
                FS.mkdir('/home/web_user/.onscripter');
                FS.mount(IDBFS, {}, '/home/web_user/.onscripter');
                Module.addRunDependency('idbfs-sync');
                FS.syncfs(true, function(err) {
                    if (err) {
                        console.warn('IDBFS initial sync error:', err);
                    }
                    try {
                        const entries = FS.readdir('/home/web_user/.onscripter');
                        for (let i = 0; i < entries.length; i++) {
                            if (entries[i] === '.' || entries[i] === '..') {
                                continue;
                            }
                            const subdir = '/home/web_user/.onscripter/' + entries[i];
                            const cfgPath = subdir + '/ons.cfg';
                            try {
                                const data = FS.readFile(cfgPath);
                                FS.writeFile('/game/ons.cfg', data);
                            } catch (e) {}
                        }
                    } catch (e) {}
                    Module.removeRunDependency('idbfs-sync');
                });
                setupGameFiles();
            }],
            onRuntimeInitialized: function() {
                document.getElementById('loading').classList.add('hidden');
                const canvas = document.getElementById('canvas');

                const originalAspect = canvas.width / canvas.height;

                function fitCanvas() {
                    if (document.fullscreenElement) {
                        return;
                    }
                    const aspect = originalAspect;
                    const vpW = window.innerWidth;
                    const vpH = window.innerHeight;
                    let w, h;
                    if (vpW / vpH > aspect) {
                        h = vpH;
                        w = Math.round(vpH * aspect);
                    } else {
                        w = vpW;
                        h = Math.round(vpW / aspect);
                    }
                    canvas.style.width = w + 'px';
                    canvas.style.height = h + 'px';
                }

                fitCanvas();
                window.addEventListener('resize', fitCanvas);
                document.addEventListener('fullscreenchange', function() {
                    if (!document.fullscreenElement) {
                        setTimeout(fitCanvas, 100);
                    }
                });

                function toNormalizedCoords(clientX, clientY) {
                    const rect = canvas.getBoundingClientRect();
                    return [
                        (clientX - rect.left) / rect.width,
                        (clientY - rect.top) / rect.height
                    ];
                }

                function sendMouseEvent(type, x, y, button) {
                    Module.ccall('ons_mouse_event', null,
                        ['number','number','number','number'], [type, x, y, button]);
                }

                canvas.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    if (e.touches.length === 1) {
                        const touch = e.touches[0];
                        const coords = toNormalizedCoords(touch.clientX, touch.clientY);
                        sendMouseEvent(2, coords[0], coords[1], 0);
                        sendMouseEvent(0, coords[0], coords[1], 0);
                    }
                }, { passive: false, capture: true });

                canvas.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    if (e.changedTouches.length === 1) {
                        const touch = e.changedTouches[0];
                        const coords = toNormalizedCoords(touch.clientX, touch.clientY);
                        sendMouseEvent(1, coords[0], coords[1], 0);
                    }
                }, { passive: false, capture: true });

                canvas.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    if (e.touches.length === 1) {
                        const touch = e.touches[0];
                        const coords = toNormalizedCoords(touch.clientX, touch.clientY);
                        sendMouseEvent(2, coords[0], coords[1], 0);
                    }
                }, { passive: false, capture: true });

                const btnFullscreen = document.getElementById('btn-fullscreen');
                const btnMenu = document.getElementById('btn-menu');

                function handleFullscreen(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    Module.ccall('ons_toggle_fullscreen');
                }
                function handleMenu(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    sendMouseEvent(0, 0.5, 0.5, 2);
                    sendMouseEvent(1, 0.5, 0.5, 2);
                }

                btnFullscreen.addEventListener('touchstart', handleFullscreen, { passive: false });
                btnFullscreen.addEventListener('click', handleFullscreen);
                btnMenu.addEventListener('touchstart', handleMenu, { passive: false });
                btnMenu.addEventListener('click', handleMenu);
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
