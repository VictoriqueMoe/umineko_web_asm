server {
    listen 80;
    server_name _;

    include mime.types;
    default_type  application/octet-stream;
    types {
        text/plain cfg;
    }

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/json application/javascript application/wasm;
    gzip_min_length 1000;

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }

    location ~ ^/game/(backgrounds|graphics)/(.+)\.hau$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files /cache/game/$1/$2.webp /game/$1/$2.png =404;
    }

    location ~ ^/game/video/(.+)\.hau$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files /cache/game/video/$1.webm /game/video/$1.mp4 =404;
    }

    location /game/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files /cache$uri $uri =404;
        error_page 404 =404 @nocache404;
    }

    location @nocache404 {
        add_header Cache-Control "no-store";
        return 404;
    }

    location ~* \.(wasm|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
