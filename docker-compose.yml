services:
  umineko-web:
    build: .
    ports:
      - "${PORT:-8080}:80"
    restart: unless-stopped
    volumes:
      - ${GAME_PATH:-./game}:/usr/share/nginx/html/game:ro
      - asset-cache:/usr/share/nginx/html/cache
    environment:
      - HOSTING_MODE=${HOSTING_MODE:-production}

volumes:
  asset-cache:
